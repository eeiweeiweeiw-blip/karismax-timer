<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カリスマックス × からておけいこ タイマー</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c8a000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="カリスマックス">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a0a2e; color:#fff; font-family:'Noto Sans JP',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }

    .bg-glow.active { background:radial-gradient(ellipse at 50% 30%,rgba(255,107,157,0.2),transparent 70%); }
    .bg-glow.rest { background:radial-gradient(ellipse at 50% 30%,rgba(0,212,170,0.15),transparent 70%); }
    .bg-glow.finish { background:radial-gradient(ellipse at 50% 30%,rgba(200,160,0,0.3),transparent 70%); }
    .flash { position:fixed; inset:0; z-index:50; pointer-events:none; opacity:0; }
    .flash.go { animation:flashAnim 0.35s ease-out; }
    @keyframes flashAnim { 0%{opacity:0.6;background:#fff} 100%{opacity:0} }
    .title-bar { position:relative; z-index:10; width:100%; max-width:480px; display:flex; justify-content:space-between; align-items:center; padding:14px 16px 8px; }
    .title-text { font-size:14px; font-weight:900; letter-spacing:1px; color:#ffd700; }
    .title-right { display:flex; gap:8px; align-items:center; }
    .qr-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; border-radius:50px; padding:6px 12px; font-size:16px; cursor:pointer; font-family:inherit; }
    .qr-modal { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:20px; }
    .qr-modal.hidden { display:none; }
    .qr-box { background:#fff; border-radius:16px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .qr-url { font-size:12px; font-weight:700; color:#111; text-align:center; }
    .qr-hint { font-size:12px; color:#666; text-align:center; line-height:1.6; }
    .qr-close { padding:12px 40px; border-radius:50px; background:#c8a000; color:#fff; border:none; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
    .main { position:relative; z-index:10; width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; padding:0 16px 10px; gap:8px; }
    .song-progress-wrap { width:100%; }
    .song-progress-label { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-bottom:5px; }
    .song-progress-bar { width:100%; height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
    .song-progress-fill { height:100%; background:linear-gradient(90deg,#c8a000,#ffd700); border-radius:2px; width:0%; transition:width 0.3s linear; }
    .circle-wrap { position:relative; width:180px; height:180px; }
    .circle-svg { transform:rotate(-90deg); width:180px; height:180px; }
    .circle-track { fill:none; stroke:rgba(255,255,255,0.07); stroke-width:10; }
    .circle-progress { fill:none; stroke:#ffd700; stroke-width:10; stroke-linecap:round; stroke-dasharray:503; stroke-dashoffset:0; transition:stroke-dashoffset 0.9s linear,stroke 0.5s; }
    .circle-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .time-display { font-size:52px; font-weight:900; line-height:1; color:#fff; }
    .time-label { font-size:11px; color:#888; margin-top:2px; }
    .exercise-part { font-size:12px; color:#ffd700; font-weight:700; letter-spacing:2px; }
    .exercise-name { font-size:28px; font-weight:900; text-align:center; line-height:1.2; }
    .exercise-tip { font-size:13px; color:rgba(255,255,255,0.75); text-align:center; line-height:1.5; min-height:20px; }
    .pose-wrap { width:100%; background:rgba(255,255,255,0.04); border-radius:16px; padding:10px; display:flex; justify-content:center; align-items:center; min-height:80px; }
    .next-wrap { width:100%; background:rgba(255,255,255,0.04); border-radius:12px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
    .next-label { font-size:14px; color:#aaa; }
    .next-name { font-size:20px; font-weight:700; color:#fff; }
    .exercise-list { display:none; }
    .ex-item { display:flex; align-items:center; gap:8px; padding:5px 10px; border-radius:8px; font-size:12px; opacity:0.45; transition:opacity 0.3s,background 0.3s; }
    .ex-item.done { opacity:0.25; text-decoration:line-through; }
    .ex-item.current { opacity:1; background:rgba(255,255,255,0.07); font-weight:700; }
    .ex-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .main-btn { width:100%; max-width:280px; padding:12px; border-radius:50px; background:linear-gradient(135deg,#c8a000,#ffd700); color:#1a0a2e; border:none; font-size:18px; font-weight:900; cursor:pointer; font-family:inherit; box-shadow:0 4px 20px rgba(200,160,0,0.4); transition:transform 0.1s; letter-spacing:2px; }
    .main-btn:active { transform:scale(0.97); }
    .countdown-overlay { position:fixed; inset:0; z-index:100; background:rgba(26,10,46,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
    .countdown-overlay.hidden { display:none; }

</head>

// ===== 音声 =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function unlockAudio() {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0); ctx.resume();
  } catch(e) {}
}
function playBeep(freq, dur, vol=0.9) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function beepWarning() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.6, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}
function beepChange() { playBeep(1047, 0.1, 1.0); setTimeout(() => playBeep(1319, 0.3, 1.0), 90); }

// ===== 種目データ (合計194秒) =====
const exercises = [
  { part:'じゅんび（0〜6）', name:'からだをほぐそう！',
    tip:'うでをおおきくまわして\nからだをほぐそう！',
    duration:6, color:'#00d4aa', svg:svgs.rabbit },
  { part:'うでたてふせ（6〜18）', name:'うでたてふせ',
    tip:'からだをまっすぐに！\nうでをまげてのばす！',
    duration:12, color:'#ff6b9d', svg:svgs.bear },
  { part:'🔥プランク（18〜43）', name:'ひじプランク',
    tip:'おなかをかたくして！\nおしりをあげないよ！',
    duration:25, color:'#ff8c42', svg:svgs.cat },
  { part:'くるりん（43〜67）', name:'くるりんジャンプ',
    tip:'しこだちからジャンプして\nはんかいてん！10かい！',
    duration:24, color:'#ffd700', svg:svgs.squirrel },
  { part:'キック（67〜94）', name:'スクワットキック',
    tip:'しゃがんでたって\nキック！15かい！',
    duration:27, color:'#4caf50', svg:svgs.frog },
  { part:'🥋しこだち（94〜106）', name:'しこだちキープ！',
    tip:'ひざをおおきくひらいて\nしこだちで12びょうキープ！',
    duration:12, color:'#e91e63', svg:svgs.tanuki },
  { part:'はいきんじゅんび（106〜112）', name:'はいきんのじゅんび',
    tip:'うつぶせになって\nじゅんびしよう！',
    duration:6, color:'#9c27b0', svg:svgs.pandaPrep },
  { part:'🔥はいきん（112〜134）', name:'はいきん',
    tip:'うつぶせで\nゆっくりうえをむく！',
    duration:22, color:'#2196f3', svg:svgs.pandaBack },
  { part:'ふっきん（134〜158）', name:'ふっきん',
    tip:'ひざをまげて\nゆっくりおきあがる！',
    duration:24, color:'#ff9800', svg:svgs.hamster },
  { part:'さいご（158〜173）', name:'ブリッジ',
    tip:'あおむけでひざをまげて\nおしりをうえにあげる！',
    duration:15, color:'#ffd700', svg:svgs.catBridge },
];
// 合計: 6+12+25+24+27+12+6+22+24+15 = 173秒 ✓

const TOTAL_SONG = 173;
const CIRCUMFERENCE = 503;
let currentIndex = 0, remaining = exercises[0].duration;
let running = false, interval = null, elapsed = 0, isFinished = false;

function updateUI() {
  const ex = exercises[currentIndex];
  const next = exercises[currentIndex + 1];
  document.getElementById('exercisePart').textContent = ex.part;
  document.getElementById('exerciseName').textContent = ex.name;
  document.getElementById('exerciseTip').innerHTML = ex.tip.replace('\n','<br>');
  document.getElementById('timeDisplay').textContent = remaining;
  document.getElementById('poseIllustration').innerHTML = ex.svg;
  const offset = CIRCUMFERENCE * (1 - remaining / ex.duration);
  document.getElementById('circleProgress').style.strokeDashoffset = offset;
  document.getElementById('circleProgress').style.stroke = ex.color;
  const totalElapsed = exercises.slice(0,currentIndex).reduce((s,e)=>s+e.duration,0) + (ex.duration - remaining);
  document.getElementById('songFill').style.width = (totalElapsed/TOTAL_SONG*100) + '%';
  const m = Math.floor(totalElapsed/60), s = totalElapsed%60;
  document.getElementById('songElapsed').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const bg = document.getElementById('bgGlow');
  if (ex.color==='#ffd700') bg.className='bg-glow finish';
  else if (ex.color==='#00d4aa'||ex.color==='#9c27b0') bg.className='bg-glow rest';
  else bg.className='bg-glow active';
  const nw = document.getElementById('nextWrap');
  if (next) { document.getElementById('nextName').textContent=next.name; nw.style.display='flex'; }
  else { nw.style.display='none'; }
  document.getElementById('exerciseList').innerHTML = exercises.map((e,i)=>`
    <div class="ex-item ${i<currentIndex?'done':i===currentIndex?'current':''}">
      <div class="ex-dot" style="background:${e.color}"></div>
      <span>${e.name}（${e.duration}びょう）</span>
    </div>`).join('');
}

function tick() {
  if (remaining > 1) {
    remaining--; elapsed++;
    if (remaining <= 5) beepWarning();
    updateUI();
  } else {
    beepChange(); triggerFlash();
    if (currentIndex < exercises.length-1) {
      currentIndex++; remaining = exercises[currentIndex].duration; elapsed++;
      updateUI();
    } else {
      clearInterval(interval); running = false; showFinish();
    }
  }
}

function triggerFlash() {
  const f = document.getElementById('flash');
  f.className='flash go'; setTimeout(()=>f.className='flash',350);
}

function toggleTimer() {
  unlockAudio();
  if (isFinished) { resetTimer(); return; }
  if (!running) {
    if (ytPlayer&&ytReady) { try { ytPlayer.mute(); ytPlayer.seekTo(0); ytPlayer.playVideo(); } catch(e){} }
    if (elapsed===0&&currentIndex===0) startCountdown();
    else resumeTimer();
  } else {
    clearInterval(interval); running=false;
    if (ytPlayer&&ytReady) ytPlayer.pauseVideo();
    document.getElementById('mainBtn').textContent='▶ つづける';
  }
}

function resumeTimer() {
  running=true; document.getElementById('mainBtn').textContent='⏸ とめる';
  if (ytPlayer&&ytReady) ytPlayer.playVideo();
  interval=setInterval(tick,1000);
}

function startCountdown() {
  const ov=document.getElementById('countdownOverlay'), numEl=document.getElementById('countdownNum');
  ov.classList.remove('hidden'); let count=3; numEl.textContent=count; beepWarning();
  const cd=setInterval(()=>{
    count--;
    if (count>0) {
      numEl.style.animation='none'; void numEl.offsetHeight;
      numEl.style.animation='countPop 1s ease'; numEl.textContent=count; beepWarning();
    } else {
      clearInterval(cd); numEl.style.animation='none'; void numEl.offsetHeight;
      numEl.style.animation='countPop 0.5s ease'; numEl.textContent='GO!'; beepChange();
      setTimeout(()=>{ ov.classList.add('hidden'); startTimer(); },600);
    }
  },1000);
}

function startTimer() {
  running=true; document.getElementById('mainBtn').textContent='⏸ とめる';
  if (ytPlayer&&ytReady) { ytPlayer.seekTo(0); ytPlayer.unMute(); ytPlayer.setVolume(100); }
  interval=setInterval(tick,1000);
}

function resetTimer() {
  clearInterval(interval); running=false; isFinished=false;
  if (ytPlayer&&ytReady) { ytPlayer.seekTo(0); ytPlayer.pauseVideo(); }
  currentIndex=0; remaining=exercises[0].duration; elapsed=0;
  document.getElementById('mainBtn').textContent='▶ すたーと';
  document.getElementById('mainArea').style.display='flex';
  document.getElementById('finishScreen').classList.remove('show');
  document.getElementById('bgGlow').className='bg-glow';
  document.getElementById('countdownOverlay').classList.add('hidden');
  updateUI();
}

function showFinish() {
  isFinished=true;
  document.getElementById('mainArea').style.display='none';
  document.getElementById('finishScreen').classList.add('show');
  document.getElementById('bgGlow').className='bg-glow finish';
  if (ytPlayer&&ytReady) ytPlayer.pauseVideo();
}

function manualPlayMusic() {
  unlockAudio();
  if (ytPlayer&&ytReady) {
    try { ytPlayer.unMute(); ytPlayer.setVolume(100); ytPlayer.playVideo();
      document.getElementById('musicBtn').textContent='🔊';
      setTimeout(()=>document.getElementById('musicBtn').textContent='🎵',2000);
    } catch(e){}
  }
}

function shareApp() {
  const url='https://eeiweeiweeiw-blip.github.io/karismax-timer/';
  if (navigator.share) navigator.share({title:'カリスマックス タイマー',text:'空手の筋トレタイマー！',url});
  else document.getElementById('qrModal').classList.remove('hidden');
}

updateUI();
if ('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
